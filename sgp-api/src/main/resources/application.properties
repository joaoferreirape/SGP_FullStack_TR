spring.application.name=sgp
server.port=8080

# Configuração do banco de dados H2
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.password=sa
spring.datasource.url=jdbc:h2:mem:sgpdb
spring.datasource.username=sa
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuração do banco de dados MySQL
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.password=Treina2017
# spring.datasource.url=jdbc:mysql://localhost:3306/sgpdb?useSSL=false&serverTimezone=Ametica/Recife
# spring.datasource.username=sgp

# Configuração do Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Configuração do Hibernate específica para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Configuração do Hibernate específica para MySQL
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuração do Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# timezone
spring.jackson.time-zone=America/Recife
